<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox Version Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: monospace;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .label {
      font-size: 13px;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .version {
      font-size: 36px;
      font-weight: bold;
      color: #00c853;
      word-break: break-all;
      text-align: center;
      padding: 0 1rem;
    }
    .status {
      font-size: 12px;
      color: #444;
      margin-top: 20px;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00c853;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <p class="label">Current Roblox Version</p>
  <p class="version" id="version">Loading...</p>
  <p class="status"><span class="dot"></span><span id="status">Fetching...</span></p>

  <script>
    async function fetchVersion() {
      const versionEl = document.getElementById('version');
      const statusEl = document.getElementById('status');
      try {
        const res = await fetch('https://raw.githubusercontent.com/MaximumADHD/Roblox-Client-Tracker/roblox/version-guid.txt');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const version = (await res.text()).trim();
        versionEl.textContent = version || 'Unknown';
        statusEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        statusEl.textContent = 'Error fetching — retrying...';
      }
    }

    fetchVersion();
    setInterval(fetchVersion, 60000);
  </script>
</body>
</html>
