<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox Version Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: monospace;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 48px;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .platform {
      font-size: 11px;
      color: #444;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .label {
      font-size: 13px;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .version {
      font-size: 30px;
      font-weight: bold;
      color: #00c853;
      word-break: break-all;
      text-align: center;
      padding: 0 1rem;
    }
    .divider {
      width: 1px;
      height: 60px;
      background: #222;
    }
    .status {
      font-size: 12px;
      color: #444;
      margin-top: 8px;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00c853;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="platform">Windows</p>
    <p class="label">Current Roblox Version</p>
    <p class="version" id="win-version">Loading...</p>
  </div>

  <div class="divider"></div>

  <div class="card">
    <p class="platform">Mac</p>
    <p class="label">Current Roblox Version</p>
    <p class="version" id="mac-version">Loading...</p>
  </div>

  <p class="status"><span class="dot"></span><span id="status">Fetching...</span></p>

  <script>
    async function fetchVersions() {
      const winEl = document.getElementById('win-version');
      const macEl = document.getElementById('mac-version');
      const statusEl = document.getElementById('status');

      try {
        const [winRes, macRes] = await Promise.all([
          fetch('https://raw.githubusercontent.com/MaximumADHD/Roblox-Client-Tracker/roblox/version-guid.txt'),
          fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://clientsettingscdn.roblox.com/v2/client-version/MacPlayer'))
        ]);

        if (winRes.ok) {
          winEl.textContent = (await winRes.text()).trim() || 'Unknown';
        }

        if (macRes.ok) {
          const data = await macRes.json();
          const json = JSON.parse(data.contents);
          macEl.textContent = json.clientVersionUpload || json.version || 'Unknown';
        }

        statusEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        statusEl.textContent = 'Error fetching — retrying...';
      }
    }

    fetchVersions();
    setInterval(fetchVersions, 60000);
  </script>
</body>
</html>
